<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SKATE CITY — Night Run</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="score-display">SCORE: <span id="sc">0</span></div>
    <div id="hi-display">BEST: <span id="hi">0</span></div>
    <div id="combo-display">x<span id="cmb">1</span> COMBO</div>
    <div id="tap-hint">SPACE / TAP TO JUMP &nbsp;|&nbsp; DOUBLE FOR DOUBLE JUMP</div>
  </div>
  <div id="overlay">
    <h1 id="overlay-title">SKATE<br>CITY</h1>
    <div class="subtitle">★ Night Run ★</div>
    <div class="instruct">
      SPACE / TAP — Jump<br>
      DOUBLE — Double Jump<br>
      SURVIVE THE NIGHT
    </div>
    <div id="dead-score"></div>
    <button id="start-btn">DROP IN</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
