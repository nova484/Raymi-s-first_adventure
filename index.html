<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SKATE CITY — Night Run</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="score-display">SCORE <span id="sc">0</span></div>
    <div id="hi-display">BEST <span id="hi">0</span></div>
    <div id="combo-display">x<span id="cmb">1</span> COMBO</div>
  </div>
  <div id="overlay">
    <div class="logo">SKATE<br><span>CITY</span></div>
    <div class="tagline">★ NIGHT RUN ★</div>
    <div class="instructions">
      SPACE / TAP — Jump &nbsp;|&nbsp; Double for Double Jump
    </div>
    <div id="dead-score"></div>
    <button id="start-btn">DROP IN</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
